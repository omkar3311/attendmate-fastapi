<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AttendMate</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <header>
        <h1>AttendMate</h1>
        <p>AI-Powered Live Attendance System</p>
    </header>

    <main class="container">
        <section class="left-panel">
            <div class="card">
                <h2>Live Feed</h2>
                <img id="live-camera" class="live-feed" src="/video_feed" alt="Live Camera Feed" />
            </div>

            <div class="card">
                <h2>Upload Known Image</h2>
                <form id="upload-form" enctype="multipart/form-data">
                    <input type="file" name="file" accept=".jpg,.jpeg,.png" required>
                    <button type="submit">Upload</button>
                    <p id="upload-status"></p>
                </form>
            </div>
        </section>

        <section class="right-panel">
            <div class="card">
                <h2>Live Attendance</h2>
                <div id="attendance-data">Loading attendance...</div>
            </div>

            <div class="card download-card">
                <a href="/export/csv">
                    <button class="download-btn">⬇ Download Attendance (CSV)</button>
                </a>
            </div>
        </section>
    </main>

    <script src="/static/js/script.js"></script>
</body>
</html>
