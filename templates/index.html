<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AttendMate</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(
                    600px 400px at 10% 0%,
                    rgba(46, 204, 113, 0.15),
                    transparent 60%
                ),
                radial-gradient(
                    500px 350px at 90% 10%,
                    rgba(72, 187, 255, 0.12),
                    transparent 55%
                ),
                linear-gradient(
                    180deg,
                    #eef2f7 0%,
                    #dbeafe 100%
                ) !important;
        }

        .container {
            position: relative;
            z-index: 1;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        header {
            background: #1e293b;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            display: flex;
            gap: 30px;
            padding: 30px;
        }

        .left-panel,
        .right-panel {
            flex: 1;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #1e293b;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        
        .upload-box {
            border: 2px dashed #94a3b8;
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .upload-box:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .upload-box label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .upload-box span {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 12px;
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-btn {
            padding: 10px 18px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: #1e40af;
        }

        #upload-status {
            margin-top: 10px;
            font-size: 13px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            font-weight: 600;
        }

        .download-card {
            text-align: center;
        }

        .download-btn {
            padding: 12px 22px;
            font-size: 15px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .download-btn:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .live-feed {
            border: 4px solid transparent;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .live-feed.active {
            border: 4px solid #22c55e;
            box-shadow: 0 0 18px rgba(34, 197, 94, 0.6);
        }
        .upload-btn-wrapper {
            margin-top: 16px;
            display: flex;
            justify-content: center;
        }
        .no-slots {
            color: #9aa0a6;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
        }

    </style>
</head>

<body>

<header>
    <h1>AttendMate</h1>
    <p>AI-Powered Live Attendance System</p>
</header>

<main class="container">

    <section class="left-panel">

        <div class="card">
            <h2>Live Feed</h2>
            <img id="live-camera" class="live-feed" src="/video_feed" alt="Live Camera Feed">
        </div>

        <div class="card">
            <h2>Upload Known Image</h2>

            <form id="upload-form" enctype="multipart/form-data">
                <div class="upload-box">
                    <label for="file-upload">📂 Upload from computer</label>
                    <span>JPG, JPEG, PNG files only</span>

                    <input id="file-upload" type="file" name="file" accept=".jpg,.jpeg,.png" required>

                    
                </div>
                <div class="upload-btn-wrapper">
                    <button class="upload-btn" type="submit">Upload Image</button>
                </div>
                <p id="upload-status"></p>
            </form>
        </div>

    </section>

    <section class="right-panel">

        <div class="card">
            <h2>Live Attendance</h2>
            <div id="attendance-data">Loading attendance...</div>
        </div>

        <div class="card download-card">
            <h2>Download Attendance</h2>
            <a href="/export/csv">
                <button class="download-btn">⬇ Download Attendance (CSV)</button>
            </a>
        </div>

    </section>

</main>

<script src="/static/js/script.js"></script>

</body>
</html>
