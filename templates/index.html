<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AttendMate</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: Arial, sans-serif; display: flex; gap: 50px; padding: 20px; }
        #teacher, #attendance { flex: 1; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div id="teacher">
        <h2>LIVE FEED</h2>
        <img src="/video_feed" width="640" height="480">
    </div>

    <div id="attendance">
        <h2>LIVE ATTENDANCE</h2>
        <div id="attendance-data">Loading attendance...</div>
    </div>

    <script>
        async function fetchAttendance() {
            try {
                const response = await fetch("/live-attendance");
                const data = await response.json();

                let html = "";
                for (const slot in data) {
                    html += `<h3>${slot}</h3><table><tr><th>Name</th><th>Status</th><th>Minutes</th></tr>`;
                    for (const name in data[slot]) {
                        const person = data[slot][name];
                        html += `<tr>
                                    <td>${name}</td>
                                    <td>${person.status}</td>
                                    <td>${person.minutes}</td>
                                 </tr>`;
                    }
                    html += "</table>";
                }
                document.getElementById("attendance-data").innerHTML = html;
            } catch (err) {
                console.error("Error fetching attendance:", err);
            }
        }

        setInterval(fetchAttendance, 2000);
        window.onload = fetchAttendance;
    </script>
</body>
</html>
