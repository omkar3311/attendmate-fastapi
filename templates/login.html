<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 6px;
        }
        .role-boxes {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .role {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .active {
            background: #c8f7c5;
            font-weight: bold;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="role-boxes">
        <div id="studentBox" class="role active" onclick="selectRole('student')">
            Student
        </div>
        <div id="teacherBox" class="role" onclick="selectRole('teacher')">
            Teacher
        </div>
    </div>

    <form method="post" action="/login">
        <input type="hidden" name="role" id="role" value="student">

        <div id="studentFields">
            <input id="student_name" name="name" placeholder="Student Name">
            <input id="student_prn" name="prn" placeholder="PRN Number">
            <input id="student_password" type="password" name="password" placeholder="Password">
        </div>

        <div id="teacherFields" class="hidden">
            <input id="teacher_id" name="teacher_id" placeholder="Teacher ID">
            <input id="teacher_name" name="teacher_name" placeholder="Teacher Name">
            <input id="teacher_password" type="password" name="teacher_password" placeholder="Password">
        </div>

        <button type="submit">Login</button>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </form>
</div>

<script>
function selectRole(role) {
    document.getElementById("role").value = role;

    const studentBox = document.getElementById("studentBox");
    const teacherBox = document.getElementById("teacherBox");
    const studentFields = document.getElementById("studentFields");
    const teacherFields = document.getElementById("teacherFields");

    studentBox.classList.remove("active");
    teacherBox.classList.remove("active");
    studentFields.classList.add("hidden");
    teacherFields.classList.add("hidden");

    document.getElementById("student_name").required = false;
    document.getElementById("student_prn").required = false;
    document.getElementById("student_password").required = false;

    document.getElementById("teacher_id").required = false;
    document.getElementById("teacher_name").required = false;
    document.getElementById("teacher_password").required = false;

    if (role === "student") {
        studentBox.classList.add("active");
        studentFields.classList.remove("hidden");

        document.getElementById("student_name").required = true;
        document.getElementById("student_prn").required = true;
        document.getElementById("student_password").required = true;
    } else {
        teacherBox.classList.add("active");
        teacherFields.classList.remove("hidden");

        document.getElementById("teacher_id").required = true;
        document.getElementById("teacher_name").required = true;
        document.getElementById("teacher_password").required = true;
    }
}

selectRole("student");
</script>

</body>
</html>
